<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>SeaPredictor — Debris Drift Forecasting</title>

<!-- Cesium (fixed version from jsDelivr, no Ion token required since we
     override imagery + disable default providers) -->
<link rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/cesium@1.120.0/Build/Cesium/Widgets/widgets.css">

<style>
  :root {
    --bg: #0a0e14;
    --panel: rgba(20, 30, 45, 0.92);
    --panel-hover: rgba(255,255,255,0.08);
    --accent: #64c8ff;
    --accent-warm: #ffa502;
    --danger: #ff4757;
    --muted: #7a8899;
    --fg: #e0e6ed;
    --border: #2a3a4d;
  }
  html, body { width: 100%; height: 100%; margin: 0; padding: 0; overflow: hidden;
               font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
               background: var(--bg); color: var(--fg); }
  #cesiumContainer { width: 100%; height: 100%; }

  /* ---- Left control panel ---- */
  #panel {
    position: absolute; top: 12px; left: 12px;
    width: 360px; max-height: calc(100vh - 24px); overflow-y: auto;
    background: var(--panel); border-radius: 8px; padding: 16px;
    box-shadow: 0 6px 24px rgba(0,0,0,0.45); z-index: 1000;
    backdrop-filter: blur(10px);
  }
  #panel h1 { font-size: 16px; margin: 0 0 2px; font-weight: 700; letter-spacing: 0.01em; }
  #panel .subtitle { font-size: 11px; color: var(--muted); margin-bottom: 14px; }
  #panel h2 { font-size: 11px; text-transform: uppercase; letter-spacing: 0.08em;
              color: var(--muted); margin: 18px 0 6px; font-weight: 600;
              display: flex; align-items: center; justify-content: space-between; }

  /* ---- Scene list ---- */
  .scene {
    padding: 8px 10px; border-radius: 4px; cursor: pointer; margin-bottom: 4px;
    background: rgba(255,255,255,0.04); border-left: 3px solid transparent;
    transition: background 0.12s, border-color 0.12s;
  }
  .scene:hover { background: var(--panel-hover); }
  .scene.active { background: rgba(100, 200, 255, 0.14); border-left-color: var(--accent); }
  .scene .sid { font-size: 12px; font-weight: 600; color: var(--fg); font-family: ui-monospace, monospace; }
  .scene .meta { font-size: 10px; color: var(--muted); margin-top: 2px; }
  .scene .dot { display: inline-block; width: 6px; height: 6px; border-radius: 50%;
                background: var(--danger); margin-right: 6px; vertical-align: middle; }

  /* ---- Forecast form ---- */
  label { display: block; font-size: 11px; color: var(--muted); margin-top: 10px; margin-bottom: 3px; }
  input[type="number"] {
    width: 100%; padding: 7px 8px; box-sizing: border-box;
    background: #0d1720; color: var(--fg); border: 1px solid var(--border);
    border-radius: 4px; font-size: 12px; font-family: ui-monospace, monospace;
  }
  input[type="number"]:focus { outline: none; border-color: var(--accent); }

  .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }

  .class-row { display: flex; align-items: center; font-size: 12px; padding: 3px 0; cursor: pointer; }
  .class-row input { margin-right: 8px; }

  .toggle-row {
    display: flex; align-items: center; justify-content: space-between;
    font-size: 12px; padding: 6px 8px; margin-top: 8px;
    background: rgba(255,255,255,0.03); border-radius: 4px;
    cursor: pointer; user-select: none;
  }
  .toggle-row:hover { background: rgba(255,255,255,0.06); }
  .toggle-row input { margin: 0; }
  .toggle-row .lab { color: var(--fg); font-weight: 500; }
  .toggle-row .help { color: var(--muted); font-size: 10px; margin-top: 2px; display: block; }

  button {
    width: 100%; padding: 10px; border: none; border-radius: 4px;
    font-size: 13px; font-weight: 600; cursor: pointer; margin-top: 12px;
    transition: background 0.12s;
  }
  button.primary { background: #2a7fe5; color: white; }
  button.primary:hover:not(:disabled) { background: #3c91f0; }
  button.primary:disabled { background: #3a4a5d; cursor: not-allowed; }
  button.ghost { background: rgba(255,255,255,0.06); color: var(--fg); margin-top: 6px; }
  button.ghost:hover { background: var(--panel-hover); }

  .preset-row { display: flex; gap: 6px; margin-top: 4px; }
  .preset-row button { margin-top: 0; padding: 6px 8px; font-size: 11px;
                       background: rgba(100,200,255,0.10); color: var(--accent);
                       border: 1px solid rgba(100,200,255,0.25); flex: 1; }
  .preset-row button:hover { background: rgba(100,200,255,0.18); }

  .stats { display: grid; grid-template-columns: auto 1fr; gap: 4px 12px;
           font-size: 12px; margin-top: 10px; padding-top: 10px;
           border-top: 1px solid var(--border); }
  .stats .k { color: var(--muted); }
  .stats .v { color: var(--fg); font-weight: 600; font-family: ui-monospace, monospace; }
  .stats .v.cached { color: var(--accent); }

  /* ---- Status banner ---- */
  #status {
    position: absolute; bottom: 14px; left: 50%; transform: translateX(-50%);
    max-width: 640px; min-width: 300px;
    background: var(--panel); color: var(--fg);
    padding: 10px 16px; border-radius: 6px; font-size: 12px;
    z-index: 1000; display: none; backdrop-filter: blur(10px);
    border-left: 3px solid var(--accent);
  }
  #status.err { border-left-color: var(--danger); }
  #status.ok { border-left-color: #43c87b; }
  #status.info { border-left-color: var(--accent); }

  /* ---- Legend ---- */
  #legend {
    position: absolute; top: 12px; right: 12px;
    background: var(--panel); padding: 10px 14px; border-radius: 6px;
    font-size: 11px; z-index: 1000; backdrop-filter: blur(10px);
    max-width: 220px;
  }
  .legend-row { display: flex; align-items: center; margin: 3px 0; }
  .legend-swatch { width: 14px; height: 4px; border-radius: 2px; margin-right: 8px; }
  .legend-swatch.dot { height: 8px; width: 8px; border-radius: 50%; }

  /* ---- Wind compass mini-viz ---- */
  .windviz {
    display: flex; align-items: center; gap: 10px; margin-top: 6px;
    padding: 6px 8px; background: rgba(255,255,255,0.03); border-radius: 4px;
    font-size: 11px;
  }
  .windviz svg { flex-shrink: 0; }
  .windviz .wd { font-family: ui-monospace, monospace; color: var(--accent); }

  /* ---- Scrollbar ---- */
  #panel::-webkit-scrollbar { width: 6px; }
  #panel::-webkit-scrollbar-track { background: transparent; }
  #panel::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  /* ---- Loading ---- */
  .spinner {
    display: inline-block; width: 12px; height: 12px; margin-right: 8px;
    border: 2px solid rgba(255,255,255,0.2); border-top-color: var(--accent);
    border-radius: 50%; animation: spin 0.8s linear infinite; vertical-align: middle;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Tighten Cesium's animation/timeline footprint at the bottom-left. */
  .cesium-viewer-bottom { left: 380px !important; }
</style>
</head>
<body>

<div id="cesiumContainer"></div>

<div id="panel">
  <h1>SeaPredictor</h1>
  <div class="subtitle">Marine debris detection &amp; drift forecasting</div>

  <h2>Identified Scenes</h2>
  <div id="scenes"><span class="spinner"></span>Loading scenes…</div>

  <div id="forecastForm" style="display:none;">
    <h2>Forecast Parameters</h2>
    <div class="grid2">
      <div>
        <label>Horizon (days)</label>
        <input type="number" id="days" value="7" min="1" max="30" step="1">
      </div>
      <div>
        <label>Particles / detection</label>
        <input type="number" id="nPerSeed" value="100" min="10" max="500" step="10">
      </div>
      <div>
        <label>Seed radius (m)</label>
        <input type="number" id="seedRadius" value="1000" min="100" max="10000" step="100">
      </div>
      <div>
        <label>Diffusivity (m²/s)</label>
        <input type="number" id="diffusivity" value="10" min="0" max="500" step="1">
      </div>
    </div>

    <h2>
      <span>Wind Forcing</span>
      <span style="text-transform:none; letter-spacing:0; color:var(--muted); font-weight:400; font-size:10px;">leeway model</span>
    </h2>
    <div class="grid2">
      <div>
        <label>Wind speed (m/s)</label>
        <input type="number" id="windSpeed" value="0" min="0" max="40" step="0.5">
      </div>
      <div>
        <label>Wind from (deg)</label>
        <input type="number" id="windDir" value="90" min="0" max="359" step="5">
      </div>
      <div>
        <label>Leeway factor (%)</label>
        <input type="number" id="windFactor" value="2.5" min="0" max="10" step="0.1">
      </div>
      <div>
        <label>&nbsp;</label>
        <div class="windviz" id="windViz">
          <svg width="36" height="36" viewBox="-20 -20 40 40">
            <circle cx="0" cy="0" r="18" fill="none" stroke="#2a3a4d" stroke-width="1"/>
            <text x="0" y="-12" font-size="6" fill="#7a8899" text-anchor="middle">N</text>
            <g id="windArrow" transform="rotate(0)">
              <line x1="0" y1="-14" x2="0" y2="14" stroke="#64c8ff" stroke-width="2"/>
              <polygon points="0,14 -3,8 3,8" fill="#64c8ff"/>
            </g>
          </svg>
          <span class="wd" id="windText">off</span>
        </div>
      </div>
    </div>

    <div class="preset-row">
      <button id="presetCalm" type="button">Calm</button>
      <button id="presetTrade" type="button">Trade wind</button>
      <button id="presetStorm" type="button">Storm</button>
    </div>

    <h2>Debris Classes</h2>
    <div id="classList"></div>

    <label class="toggle-row" for="animateToggle">
      <span>
        <span class="lab">Animate playback</span>
        <span class="help">Time-stepped particles via Cesium clock</span>
      </span>
      <input type="checkbox" id="animateToggle" checked>
    </label>

    <button id="runForecast" class="primary">Run Forecast</button>
    <button id="clearForecast" class="ghost">Clear Forecast Layers</button>

    <div class="stats" id="forecastStats" style="display:none;"></div>
  </div>
</div>

<div id="legend">
  <div style="font-weight:600; margin-bottom: 4px;">Legend</div>
  <div class="legend-row"><span class="legend-swatch dot" style="background:#ff4757"></span>Scene hotspot (count = detections)</div>
  <div class="legend-row"><span class="legend-swatch" style="background:#ff4757"></span>Debris-positive tile</div>
  <div class="legend-row"><span class="legend-swatch" style="background:#50b4ff"></span>Particle path (drift)</div>
  <div class="legend-row"><span class="legend-swatch dot" style="background:#ffa502"></span>Animated particle</div>
</div>

<div id="status"></div>

<script>
  window.CESIUM_BASE_URL = 'https://cdn.jsdelivr.net/npm/cesium@1.120.0/Build/Cesium/';
</script>
<script src="https://cdn.jsdelivr.net/npm/cesium@1.120.0/Build/Cesium/Cesium.js"></script>
<script>
  'use strict';

  // ------------------------------------------------------------------------ //
  // Cesium viewer — OSM imagery, no Ion token, ellipsoid terrain             //
  // The animation + timeline widgets are enabled so the CZML clock drives    //
  // the time-varying particle entities.                                      //
  // ------------------------------------------------------------------------ //
  const viewer = new Cesium.Viewer('cesiumContainer', {
    imageryProvider: new Cesium.UrlTemplateImageryProvider({
      url: 'https://tile.openstreetmap.org/{z}/{x}/{y}.png',
      credit: '© OpenStreetMap contributors',
      maximumLevel: 19,
    }),
    terrainProvider: new Cesium.EllipsoidTerrainProvider(),
    baseLayerPicker: false,
    geocoder: false,
    homeButton: false,
    sceneModePicker: false,
    navigationHelpButton: false,
    animation: true,
    timeline: true,
    fullscreenButton: false,
    infoBox: true,
    selectionIndicator: false,
    requestRenderMode: false, // animations need continuous render
  });

  viewer.scene.backgroundColor = Cesium.Color.fromCssColorString('#0a0e14');
  viewer.scene.globe.baseColor = Cesium.Color.fromCssColorString('#1a2332');
  viewer.scene.globe.showGroundAtmosphere = true;
  viewer.clock.shouldAnimate = false;

  viewer.camera.setView({
    destination: Cesium.Cartesian3.fromDegrees(-60, 15, 18_000_000),
  });

  // ------------------------------------------------------------------------ //
  // State                                                                    //
  // ------------------------------------------------------------------------ //
  const state = {
    scenes: [],
    classNames: [],
    defaultClasses: [],
    currentScene: null,
    sceneMarkers: [],
    layers: {
      detections: null,
      paths: null,
      final: null,
      czml: null,
    },
  };

  // ------------------------------------------------------------------------ //
  // Helpers                                                                  //
  // ------------------------------------------------------------------------ //
  const $ = (id) => document.getElementById(id);

  function setStatus(msg, kind = 'info') {
    const el = $('status');
    el.className = kind;
    el.innerHTML = kind === 'info' && msg.includes('…')
      ? `<span class="spinner"></span>${msg}`
      : msg;
    el.style.display = 'block';
  }

  function clearStatus() { $('status').style.display = 'none'; }

  async function api(path, opts) {
    const r = await fetch(path, opts);
    if (!r.ok) {
      let detail = r.statusText;
      try { detail = (await r.json()).detail ?? detail; } catch {}
      throw new Error(`${r.status}: ${detail}`);
    }
    return r.json();
  }

  function removeLayer(key) {
    const ds = state.layers[key];
    if (ds) { viewer.dataSources.remove(ds, true); state.layers[key] = null; }
  }

  function clearForecastLayers() {
    removeLayer('paths');
    removeLayer('final');
    removeLayer('czml');
    viewer.clock.shouldAnimate = false;
    $('forecastStats').style.display = 'none';
  }

  function clearAllOverlays() {
    removeLayer('detections');
    clearForecastLayers();
  }

  // ------------------------------------------------------------------------ //
  // Wind controls (compass + presets)                                        //
  // ------------------------------------------------------------------------ //
  function updateWindViz() {
    const speed = +$('windSpeed').value;
    const dir = +$('windDir').value;
    // Wind FROM convention. Arrow points in the direction the wind is going TO,
    // so we rotate by (dir + 180) deg.
    const arrowDeg = (dir + 180) % 360;
    $('windArrow').setAttribute('transform', `rotate(${arrowDeg})`);
    $('windText').textContent = speed > 0
      ? `${speed.toFixed(1)} m/s · ${dir.toFixed(0)}°`
      : 'off';
  }

  function applyPreset(speed, dir, factor) {
    $('windSpeed').value = speed;
    $('windDir').value = dir;
    $('windFactor').value = factor;
    updateWindViz();
  }

  // ------------------------------------------------------------------------ //
  // Scene loading                                                            //
  // ------------------------------------------------------------------------ //
  async function loadScenes() {
    try {
      const idx = await api('/api/scenes');
      state.scenes = idx.scenes || [];
      state.classNames = idx.class_names || [];
      state.defaultClasses = idx.default_debris_classes || [];
      renderSceneList();
      plotSceneMarkers();
      renderClassList();
      setStatus(
        `Loaded ${state.scenes.length} scenes · OSCAR window ${idx.oscar_coverage?.start} → ${idx.oscar_coverage?.end}`,
        'ok',
      );
    } catch (e) {
      $('scenes').textContent = '';
      setStatus('Failed to load scenes: ' + e.message, 'err');
    }
  }

  function renderSceneList() {
    const root = $('scenes');
    root.innerHTML = '';
    if (state.scenes.length === 0) {
      root.innerHTML = '<div style="font-size:12px;color:var(--muted);">No scenes yet. Run <code>python -m src.pipeline.build_scenes</code>.</div>';
      return;
    }
    for (const s of state.scenes) {
      const el = document.createElement('div');
      el.className = 'scene';
      el.dataset.sceneId = s.scene_id;
      el.innerHTML = `
        <div class="sid"><span class="dot"></span>${s.scene_id}</div>
        <div class="meta">${s.obs_date || '?'} · ${s.n_detections}/${s.n_tiles} debris tiles</div>
      `;
      el.addEventListener('click', () => selectScene(s, { flyTo: true }));
      root.appendChild(el);
    }
  }

  function plotSceneMarkers() {
    for (const e of state.sceneMarkers) viewer.entities.remove(e);
    state.sceneMarkers = [];

    for (const s of state.scenes) {
      if (s.centroid_lat == null || s.centroid_lon == null) continue;
      const e = viewer.entities.add({
        id: 'scene:' + s.scene_id,
        name: s.scene_id,
        position: Cesium.Cartesian3.fromDegrees(s.centroid_lon, s.centroid_lat),
        point: {
          pixelSize: 12 + Math.min(10, Math.log2(s.n_detections + 1) * 2),
          color: Cesium.Color.fromCssColorString('#ff4757'),
          outlineColor: Cesium.Color.WHITE,
          outlineWidth: 2,
          heightReference: Cesium.HeightReference.CLAMP_TO_GROUND,
        },
        label: {
          text: String(s.n_detections),
          font: 'bold 11px sans-serif',
          fillColor: Cesium.Color.WHITE,
          showBackground: true,
          backgroundColor: Cesium.Color.fromCssColorString('rgba(0,0,0,0.6)'),
          backgroundPadding: new Cesium.Cartesian2(6, 4),
          style: Cesium.LabelStyle.FILL,
          horizontalOrigin: Cesium.HorizontalOrigin.LEFT,
          verticalOrigin: Cesium.VerticalOrigin.CENTER,
          pixelOffset: new Cesium.Cartesian2(14, 0),
          disableDepthTestDistance: Number.POSITIVE_INFINITY,
          heightReference: Cesium.HeightReference.CLAMP_TO_GROUND,
        },
        description: `
          <table style="color:#222;">
            <tr><th style="text-align:left; padding-right:12px;">Date</th><td>${s.obs_date || '?'}</td></tr>
            <tr><th style="text-align:left; padding-right:12px;">Detections</th><td>${s.n_detections} / ${s.n_tiles} tiles</td></tr>
            <tr><th style="text-align:left; padding-right:12px;">Centroid</th><td>${s.centroid_lat.toFixed(3)}, ${s.centroid_lon.toFixed(3)}</td></tr>
            <tr><th style="text-align:left; padding-right:12px;">OSCAR</th><td>${s.has_oscar_coverage ? 'available' : 'missing'}</td></tr>
          </table>
        `,
        _sceneMeta: s,
      });
      state.sceneMarkers.push(e);
    }
    if (state.sceneMarkers.length) {
      viewer.flyTo(state.sceneMarkers, { duration: 2.5 });
    }
  }

  async function selectScene(s, { flyTo } = { flyTo: false }) {
    state.currentScene = s;
    clearAllOverlays();
    clearStatus();

    document.querySelectorAll('.scene').forEach((el) => {
      el.classList.toggle('active', el.dataset.sceneId === s.scene_id);
    });

    $('forecastForm').style.display = 'block';

    if (flyTo && s.bbox_wgs84) {
      const [w, sLat, e, nLat] = s.bbox_wgs84;
      const pad = 0.15;
      viewer.camera.flyTo({
        destination: Cesium.Rectangle.fromDegrees(w - pad, sLat - pad, e + pad, nLat + pad),
        duration: 1.6,
      });
    }

    try {
      const ds = await Cesium.GeoJsonDataSource.load(
        `/api/scenes/${encodeURIComponent(s.scene_id)}/detections`,
        {
          stroke: Cesium.Color.fromCssColorString('#ff4757'),
          fill: Cesium.Color.fromCssColorString('rgba(255,71,87,0.32)'),
          strokeWidth: 2,
          clampToGround: true,
        },
      );
      await viewer.dataSources.add(ds);
      state.layers.detections = ds;
      setStatus(`Scene ${s.scene_id} · ${s.n_detections} debris tile(s) loaded`, 'ok');
    } catch (e) {
      setStatus('Could not load detection polygons: ' + e.message, 'err');
    }
  }

  function renderClassList() {
    const root = $('classList');
    root.innerHTML = '';
    for (const cls of state.defaultClasses) {
      const row = document.createElement('label');
      row.className = 'class-row';
      row.innerHTML = `
        <input type="checkbox" value="${cls}" ${cls === 0 ? 'checked' : ''}>
        ${state.classNames[cls] ?? ('class ' + cls)}
      `;
      root.appendChild(row);
    }
  }

  // ------------------------------------------------------------------------ //
  // Forecast                                                                 //
  // ------------------------------------------------------------------------ //
  async function runForecast() {
    if (!state.currentScene) { setStatus('Pick a scene first.', 'err'); return; }

    const btn = $('runForecast');
    const classes = [...document.querySelectorAll('#classList input:checked')].map((i) => +i.value);
    if (classes.length === 0) { setStatus('Pick at least one debris class.', 'err'); return; }

    const body = {
      scene_id: state.currentScene.scene_id,
      days: +$('days').value,
      n_per_seed: +$('nPerSeed').value,
      seed_radius_m: +$('seedRadius').value,
      horizontal_diffusivity: +$('diffusivity').value,
      debris_classes: classes,
      wind_speed_ms: +$('windSpeed').value,
      wind_dir_deg: +$('windDir').value,
      // UI surfaces leeway as % to be more intuitive; backend wants fraction.
      wind_drift_factor: (+$('windFactor').value) / 100.0,
    };

    const animate = $('animateToggle').checked;

    clearForecastLayers();
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span>Running…';
    setStatus('Running OpenDrift simulation… (first run ~20-60s, cached reruns are instant)', 'info');

    const t0 = performance.now();
    try {
      const resp = await api('/api/forecast', {
        method: 'POST',
        headers: { 'content-type': 'application/json' },
        body: JSON.stringify(body),
      });

      // Static layers (always loaded so the user has trails + final spread).
      const pathDs = await Cesium.GeoJsonDataSource.load(resp.paths_url, {
        stroke: Cesium.Color.fromCssColorString('#50b4ff').withAlpha(animate ? 0.10 : 0.22),
        strokeWidth: 1,
        clampToGround: true,
      });
      await viewer.dataSources.add(pathDs);
      state.layers.paths = pathDs;

      const finalDs = await Cesium.GeoJsonDataSource.load(resp.final_url, {
        markerSize: 8,
        markerColor: Cesium.Color.fromCssColorString('#ffa502'),
        clampToGround: true,
      });
      await viewer.dataSources.add(finalDs);
      state.layers.final = finalDs;

      // Time-animated CZML layer when available + enabled.
      if (animate && resp.czml_url) {
        try {
          const czmlDs = await Cesium.CzmlDataSource.load(resp.czml_url);
          await viewer.dataSources.add(czmlDs);
          state.layers.czml = czmlDs;

          // Use the CZML's clock if its document defined one.
          const docClock = czmlDs.clock;
          if (docClock) {
            viewer.clock.startTime = docClock.startTime.clone();
            viewer.clock.stopTime = docClock.stopTime.clone();
            viewer.clock.currentTime = docClock.currentTime.clone();
            viewer.clock.clockRange = docClock.clockRange;
            viewer.clock.multiplier = Math.max(docClock.multiplier, 600);
            viewer.timeline.zoomTo(docClock.startTime, docClock.stopTime);
          } else if (resp.stats?.time_start && resp.stats?.time_end) {
            const s = Cesium.JulianDate.fromIso8601(resp.stats.time_start);
            const e = Cesium.JulianDate.fromIso8601(resp.stats.time_end);
            viewer.clock.startTime = s.clone();
            viewer.clock.stopTime = e.clone();
            viewer.clock.currentTime = s.clone();
            viewer.clock.clockRange = Cesium.ClockRange.LOOP_STOP;
            viewer.clock.multiplier = 3600;
            viewer.timeline.zoomTo(s, e);
          }
          viewer.clock.shouldAnimate = true;
        } catch (e) {
          console.warn('CZML load failed, falling back to static view', e);
        }
      }

      const wall = ((performance.now() - t0) / 1000).toFixed(1);
      const cachedTag = resp.cached
        ? `<span class="v cached">cached</span>`
        : `<span class="v">${resp.stats.elapsed_s}s</span>`;
      const animTag = state.layers.czml
        ? `<span class="v cached">on</span>`
        : `<span class="v">off</span>`;
      $('forecastStats').style.display = 'grid';
      $('forecastStats').innerHTML = `
        <span class="k">Particles</span><span class="v">${resp.stats.n_particles}</span>
        <span class="k">Paths</span><span class="v">${resp.stats.n_features_paths}</span>
        <span class="k">Final pts</span><span class="v">${resp.stats.n_features_final}</span>
        <span class="k">Animation</span>${animTag}
        <span class="k">Compute</span>${cachedTag}
        <span class="k">Wall time</span><span class="v">${wall}s</span>
        <span class="k">Cache key</span><span class="v" style="font-size:10px;">${resp.cache_key}</span>
      `;
      setStatus(
        resp.cached
          ? `Loaded cached forecast (${resp.stats.n_particles} particles, ${wall}s round-trip).`
          : `Forecast complete: ${resp.stats.n_particles} particles in ${resp.stats.elapsed_s}s compute.`,
        'ok',
      );
    } catch (e) {
      setStatus('Forecast failed: ' + e.message, 'err');
    } finally {
      btn.disabled = false;
      btn.textContent = 'Run Forecast';
    }
  }

  // ------------------------------------------------------------------------ //
  // Wiring                                                                   //
  // ------------------------------------------------------------------------ //
  $('runForecast').addEventListener('click', runForecast);
  $('clearForecast').addEventListener('click', () => {
    clearForecastLayers();
    setStatus('Forecast layers cleared.', 'info');
  });
  $('windSpeed').addEventListener('input', updateWindViz);
  $('windDir').addEventListener('input', updateWindViz);
  $('presetCalm').addEventListener('click', () => applyPreset(0, 90, 2.5));
  $('presetTrade').addEventListener('click', () => applyPreset(6, 90, 2.5));
  $('presetStorm').addEventListener('click', () => applyPreset(15, 90, 3.5));

  viewer.selectedEntityChanged.addEventListener((entity) => {
    if (entity && entity._sceneMeta) {
      selectScene(entity._sceneMeta, { flyTo: true });
    }
  });

  updateWindViz();
  loadScenes();
</script>
</body>
</html>
